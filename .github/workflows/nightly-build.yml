name: Nightly Podman Build with ImageFS Plugin

on:
  schedule:
    # Run at 2:17 AM UTC every night
    - cron: "17 2 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      build_datetime: ${{ steps.version.outputs.build_datetime }}
    steps:
      - name: Generate version info
        id: version
        run: |
          echo "build_datetime=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "release_tag=nightly-$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

  build-matrix:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rhel_version: "8"
            container: "registry.access.redhat.com/ubi8/go-toolset"
          - rhel_version: "9"
            container: "registry.access.redhat.com/ubi9/go-toolset"
          - rhel_version: "10"
            container: "registry.access.redhat.com/ubi10/go-toolset"
    container:
      image: ${{ matrix.container }}
      options: --user root
    permissions:
      contents: write

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            git \
            make \
            gcc \
            libseccomp-devel \
            libselinux-devel \
            gpgme-devel \
            device-mapper-devel \
            pkg-config \
            systemd-devel

      - name: Checkout Podman main
        uses: actions/checkout@v4
        with:
          repository: podman-container-tools/podman
          ref: main
          path: podman

      - name: Clone and replace container-libs with imagefs-plugin branch
        working-directory: podman
        run: |
          # Clone the custom container-libs fork
          git clone --depth 1 --branch imagefs-plugin https://github.com/redhat-hpc/container-libs.git /tmp/container-libs

          # Replace with local path
          go mod edit -replace go.podman.io/storage=/tmp/container-libs/storage

          go mod tidy
          go mod vendor

      - name: Build Podman for linux/amd64
        working-directory: podman
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
          BUILDTAGS: "seccomp selinux systemd exclude_graphdriver_btrfs"
        run: |
          make podman

      - name: Get Podman version
        id: podman_version
        working-directory: podman
        run: |
          echo "version=$(./bin/podman --version)" >> $GITHUB_OUTPUT

      - name: Package binary
        working-directory: podman
        run: |
          mkdir -p release
          cp bin/podman release/podman-rhel${{ matrix.rhel_version }}-amd64
          chmod +x release/podman-rhel${{ matrix.rhel_version }}-amd64
          cd release
          tar -czf podman-rhel${{ matrix.rhel_version }}-amd64.tar.gz podman-rhel${{ matrix.rhel_version }}-amd64
          sha256sum podman-rhel${{ matrix.rhel_version }}-amd64.tar.gz > podman-rhel${{ matrix.rhel_version }}-amd64.tar.gz.sha256

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Nightly Build ${{ needs.prepare.outputs.build_datetime }}
          files: |
            podman/release/podman-rhel${{ matrix.rhel_version }}-amd64.tar.gz
            podman/release/podman-rhel${{ matrix.rhel_version }}-amd64.tar.gz.sha256
          draft: false
          prerelease: true

  finalize-release:
    needs: [prepare, build-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update release description
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Nightly Build ${{ needs.prepare.outputs.build_datetime }}
          body: |
            ## Podman Nightly Build with ImageFS Plugin

            **Build Date**: ${{ needs.prepare.outputs.build_datetime }} UTC
            **Architecture**: linux/amd64

            ### Configuration
            - **Base**: podman-container-tools/podman (main branch)
            - **Container-libs**: redhat-hpc/container-libs (imagefs-plugin branch)

            ### Available Builds

            | RHEL Version | Files |
            |--------------|-------|
            | RHEL 8 | `podman-rhel8-amd64.tar.gz` + `.sha256` |
            | RHEL 9 | `podman-rhel9-amd64.tar.gz` + `.sha256` |
            | RHEL 10 | `podman-rhel10-amd64.tar.gz` + `.sha256` |

            Download the appropriate binary for your RHEL version.

            Built using Red Hat Universal Base Image (UBI) Go toolset containers.
          draft: false
          prerelease: true
